name: brain-daily

on:
  schedule:
    - cron: '17 16 * * *' # adjust as needed
  workflow_dispatch:

jobs:
  brain-update:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up repo state
        run: |
          chmod +x scripts/update_brain.sh
          ./scripts/update_brain.sh

      - name: Show diff
        run: |
          git status --short
          git diff -- . ':!package-lock.json' ':!pnpm-lock.yaml' || true

      # Replace this section with your actual agent integration.
      # Good pattern:
      # 1. Generate a daily note draft
      # 2. Patch only volatile files
      # 3. Open PR instead of committing directly

      - name: Reminder
        run: |
          echo "Wire this workflow to your actual agent or MCP setup."
          echo "Prefer PR creation over blind direct commits."
